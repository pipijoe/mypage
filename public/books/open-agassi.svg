<svg width="360" height="520" viewBox="0 0 360 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">《网：阿加西自传》封面风格插画</title>
  <desc id="desc">黑白人像、荧光黄网字和签名元素组成的书籍封面风格插画。</desc>
  <defs>
    <radialGradient id="skin" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="0.48" stop-color="#a3a3a3"/>
      <stop offset="1" stop-color="#171717"/>
    </radialGradient>
    <radialGradient id="glow" cx="28%" cy="28%" r="55%">
      <stop offset="0" stop-color="#f5ff3f" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f5ff3f" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#090909"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>
